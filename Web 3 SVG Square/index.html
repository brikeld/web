<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design - Page 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="snap-container">
        <section class="page" id="page1">
            <div class="p1_rectangle p1_left-rectangle">
                <img src="svg/E_Purple.svg" alt="Left Icon" />
            </div>
            <div class="p1_rectangle p1_center-rectangle">
                <img src="svg/C_Purple.svg" alt="Center Icon"/>
            </div>
            <div class="p1_rectangle p1_right-rectangle">
                <img src="svg/I_Purple.svg" alt="Right Icon"/>
                <div class="p1_pink-SVG">
                    <img src="svg/01_Pink.svg" alt="Pink Icon"/>
                </div>
            </div>
        </section>
        <section class="page" id="page2">
            <div class="initial-text-container">
                <div id="text-line-1" class="moving-text">Sed ut perspiciatis unde omnis iste natus error sit voluptatem</div>
                <div id="text-line-2" class="moving-text">At vero eos et accusamus et iusto odio dignissimos ducimus</div>
                <div id="text-line-3" class="moving-text">On the other hand, we denounce with righteous indignation</div>
            </div>
        </section>





        <section class="page" id="page3">
            <div class="squares-container">
                <object type="image/svg+xml" data="images/square-01.svg" id="square-01" class="square-svg" alt="Square 1"></object>
                <object type="image/svg+xml" data="images/square-02.svg" id="square-02" class="square-svg" alt="Square 2"></object>
                <object type="image/svg+xml" data="images/square-03.svg" id="square-03" class="square-svg" alt="Square 3"></object>
            </div>
        </section>





        <section class="page" id="page4">
        </section>




        
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
