<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design - Page 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="snap-container">
        <section class="page" id="page1">
            <div class="p1_rectangle p1_left-rectangle">
                <img src="svg/E_Purple.svg" alt="Left Icon" />
            </div>
            <div class="p1_rectangle p1_center-rectangle">
                <img src="svg/C_Purple.svg" alt="Center Icon"/>
            </div>
            <div class="p1_rectangle p1_right-rectangle">
                <img src="svg/I_Purple.svg" alt="Right Icon"/>
                <div class="p1_pink-SVG">
                    <img src="svg/01_Pink.svg" alt="Pink Icon"/>
                </div>
            </div>
        </section>
        <section class="page" id="page2">
        </section>





        <section class="page" id="page3">
            <div class="p3_labyrinth">
                <object type="image/svg+xml" data="images/Labyrinthe-03.svg" id="labyrinth-svg" alt="Labyrinth Icon"></object>
            </div>
        </section>





        <section class="page" id="page4">
        </section>




        
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
